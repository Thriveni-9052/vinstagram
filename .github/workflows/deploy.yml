name: Docker CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |
            set -e

            cd /home/ubuntu

            # clone or update
            if [ ! -d "vinstagram" ]; then
              git clone https://github.com/Thriveni-9052/vinstagram.git
            fi

            cd vinstagram
            git pull origin main

            # docker build + restart
            docker compose down || true
            docker compose up -d --build
