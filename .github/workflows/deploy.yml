name: Full Auto Deploy (Zero Setup)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |
            set -e

            # ================= SYSTEM UPDATE =================
            sudo apt update -y
            sudo apt upgrade -y

            # ================= INSTALL REQUIREMENTS =================
            sudo apt install -y \
              git \
              python3 \
              python3-pip \
              python3-venv \
              nginx \
              docker.io \
              docker-compose-plugin

            # ================= START DOCKER =================
            sudo systemctl enable docker
            sudo systemctl start docker
            sudo usermod -aG docker ubuntu || true

            # ================= PROJECT =================
            cd /home/ubuntu

            if [ ! -d "vinstagram" ]; then
              git clone https://github.com/Thriveni-9052/vinstagram.git
            fi

            cd vinstagram
            git pull origin main
            

            # ================= DOCKER DEPLOY =================
            docker compose down || true
            docker compose up -d --build
