name: Full Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup EC2 & Deploy
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |
            # Fix apt lock
            sudo rm -f /var/lib/apt/lists/lock
            sudo rm -f /var/cache/apt/archives/lock
            sudo rm -f /var/lib/dpkg/lock*
            sudo dpkg --configure -a

            # Update
            sudo apt update -y

            # Install packages
            sudo apt install -y python3 python3-pip python3.12-venv git nginx

            # Clone only if not exists
            if [ ! -d "/home/ubuntu/vinstagram" ]; then
              git clone https://github.com/Thriveni-9052/vinstagram.git /home/ubuntu/vinstagram
            fi

            cd /home/ubuntu/vinstagram

            # Pull latest code
            git pull origin main

            # Setup virtual environment
            python3 -m venv venv
            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            # =========================
            # 🔥 CREATE GUNICORN SERVICE
            # =========================
            sudo bash -c 'cat > /etc/systemd/system/vinstagram.service <<EOF
            [Unit]
            Description=Gunicorn instance
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/home/ubuntu/vinstagram
            ExecStart=/home/ubuntu/vinstagram/venv/bin/gunicorn -w 3 -b 127.0.0.1:8000 backend.app:app

            [Install]
            WantedBy=multi-user.target
            EOF'

            sudo systemctl daemon-reexec
            sudo systemctl daemon-reload
            sudo systemctl enable vinstagram
            sudo systemctl restart vinstagram

            # =========================
            # 🔥 NGINX CONFIG
            # =========================

            # Remove default nginx
            sudo rm -f /etc/nginx/sites-enabled/default

            # Ensure folders exist
            sudo mkdir -p /etc/nginx/sites-available
            sudo mkdir -p /etc/nginx/sites-enabled

            # Create config
            sudo bash -c 'cat > /etc/nginx/sites-available/vinstagram <<EOF
            server {
                listen 80;
                server_name _;

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    include proxy_params;
                }
            }
            EOF'

            # Enable site
            sudo ln -sf /etc/nginx/sites-available/vinstagram /etc/nginx/sites-enabled/vinstagram

            # Restart nginx
            sudo systemctl restart nginx

            
