name: Full Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ubuntu
          key: ${{ secrets.KEY }}
          script: |
            set -e

            # ================= FIX APT LOCK =================
            sudo killall apt apt-get || true
            sudo rm -f /var/lib/dpkg/lock-frontend || true
            sudo rm -f /var/lib/dpkg/lock || true
            sudo dpkg --configure -a || true

            # ================= SYSTEM UPDATE =================
            sudo apt update -y
            sudo apt install -y python3 python3-pip python3-venv git nginx

            # ================= PROJECT =================
            if [ ! -d "/home/ubuntu/vinstagram" ]; then
              git clone https://github.com/Thriveni-9052/vinstagram.git /home/ubuntu/vinstagram
            fi

            cd /home/ubuntu/vinstagram
            git pull origin main

            # ================= VENV =================
            python3 -m venv venv
            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            # ================= SIMPLE DB INIT (SAFE) =================
            python3 -c "from backend.app import app, db; app.app_context().push(); db.create_all()"

            # ================= SYSTEMD =================
            sudo tee /etc/systemd/system/vinstagram.service > /dev/null <<EOF
[Unit]
Description=Gunicorn App
After=network.target

[Service]
User=ubuntu
WorkingDirectory=/home/ubuntu/vinstagram
ExecStart=/home/ubuntu/vinstagram/venv/bin/gunicorn -w 3 -b 127.0.0.1:8000 backend.app:app
Restart=always

[Install]
WantedBy=multi-user.target
EOF

            sudo systemctl daemon-reload
            sudo systemctl enable vinstagram
            sudo systemctl restart vinstagram

            # ================= NGINX =================
            sudo rm -f /etc/nginx/sites-enabled/default || true

            sudo tee /etc/nginx/sites-available/vinstagram > /dev/null <<EOF
server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8000;
        include proxy_params;
    }
}
EOF

            sudo ln -sf /etc/nginx/sites-available/vinstagram /etc/nginx/sites-enabled/vinstagram
            sudo nginx -t
            sudo systemctl restart nginx
